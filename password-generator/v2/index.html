<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<link href="style.css" rel="stylesheet" />
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        <circle cx="12" cy="16" r="1.2" fill="currentColor" stroke="none"/>
      </svg>
    </div>
    <h1>Password Generator</h1>
    <p class="subtitle">Argon2id · v2</p>
  </header>

  <div class="card">
    <div class="field">
      <label for="site">Site / Service</label>
      <input type="text" id="site" placeholder="Your salt" autocomplete="off" autocorrect="off" spellcheck="false" autocapitalize="off">
    </div>

    <div class="divider"></div>

    <div class="field">
      <label for="master">
        Master password
        <button class="toggle-vis" id="toggleMaster" onclick="toggleField('master','toggleMaster')" tabindex="-1">
          <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          Show
        </button>
      </label>
      <input type="password" id="master" placeholder="Your passphrase" autocomplete="off" autocorrect="off" spellcheck="false" autocapitalize="off">
    </div>

    <div class="divider"></div>

    <div class="field">
      <label for="length">Characters</label>
      <input type="number" id="length" value="30" min="15" max="30" placeholder="30">
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generate()">Generate</button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="output-card">
    <div class="output-label">
      Generated password
      <button class="toggle-vis" id="toggleOutput" onclick="toggleOutput()" tabindex="-1">
        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        Show
      </button>
    </div>
    <div class="output-value empty" id="outputValue">No password generated yet</div>
    <div class="output-footer">
      <div class="checksum-area">
        <span class="checksum-badge" id="checksumBadge">?</span>
        <span>Checksum</span>
      </div>
      <button class="copy-btn" id="copyBtn" onclick="copyPassword()">Copy</button>
    </div>
  </div>

  <p class="params-hint">Argon2id · 256 MB · 3 iterations · parallelism 1</p>

</div>

<script src="argon2-1.18.0-bundled.min.js"></script>
<script src="script.js"></script>
</body>
</html>
